<head> <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<div class="container d-flex justify-content-center flex-column min-vh-100" style="font-family:'Roboto', sans-serif">


    <div class="row justify-content-md-center">
        @if (cameraDTO) {

        <form #form="ngForm" class="col-6 border p-3 rounded">
    <h1 class="row justify-content-md-center mb-5"> MODIFICA CAMERA </h1>

            <div class="input-group mb-4">

        
                <select class="form-select" aria-label="Default select example" id="numero" name="numero"
                    [(ngModel)]="cameraDTO.postiLetto" class="form-control">


                    <option value="" disabled>Posti letto</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>


                </select>

                @if (!!this.cameraDTO.postiLettoError) {
                <p style="color:red" class="invalid-feedback d-block">{{cameraDTO.postiLettoError}}</p>
                }
            </div>

     <div class="input-group mb-4">
                <select id="tipologia" class="form-select" [(ngModel)]="cameraDTO.tipologia" name="tipologia">
                    <option [ngValue]="null" disabled selected>Seleziona tipologia camera</option>
                    @for (tipo of tipologie; track tipo) {
                    <option [ngValue]="tipo">{{ tipo }}</option>
                    }
                </select>
                @if (!!this.cameraDTO.tipologiaError) {
                <p style="color:red" class="invalid-feedback d-block">{{cameraDTO.tipologiaError}}</p>
                }
            </div>



            <div class="input-group mb-4">
                <span class="input-group-text fs-5" id="inputGroupPrepend">€</span>
                <input type=text name="tariffa" class="form-control" aria-label="Amount (to the nearest dollar)"
                    [(ngModel)]="cameraDTO.tariffa" #tariffa="ngModel" placeholder="Tariffa">


                @if (!!this.cameraDTO.tariffaError) {
                <p style="color:red" class="invalid-feedback d-block">{{cameraDTO.tariffaError}}</p>
                }

            </div>



            <div class="d-flex justify-content-md-center gap-3 mb-4 mt-5">

                <button type="submit" (click)="updateCamera()" class="btn btn-primary btn-sm">Aggiorna</button>
                
            </div>

             <button type="button" (click)="VaiAPaginaPrecedente()" class="btn btn-danger btn-bg">
               <i class="bi bi-reply"></i>
                </button>



        </form>
        } @else {
        <p class="row justify-content-md-center">Caricamento camera...</p>
        }
    </div>



</div>
