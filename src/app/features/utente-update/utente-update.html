<app-nav-layout></app-nav-layout>

<div class="container d-flex justify-content-center flex-column min-vh-100">


    @if (this.utenteDTO) {
    <div class="row justify-content-md-center">

        <app-form-layout submitLabel="Aggiorna" [showReset]="false" (formSubmit)="updateUtente()"
            (formBack)="VaiAPaginaPrecedente()">

            <h1 class="row justify-content-md-center mb-5"> MODIFICA UTENTE </h1>

            <div class="input-group input-group-sm mb-4">
                <span class="input-group-text">Codice Utente</span>
                <input name="codiceUtente" [(ngModel)]="utenteDTO.codiceUtente" type="text" class="form-control"
                    disabled>
            </div>

            <div class="input-group input-group-sm mb-4">
                <input name="nome" [(ngModel)]="utenteDTO.nome" type="text" class="form-control" placeholder="Nome"
                    (blur)="utenteDTO.nomeUtenteValidate()">
                <app-form-error [error]="utenteDTO.nomeError" />
            </div>

            <div class="input-group input-group-sm mb-4">
                <input name="cognome" [(ngModel)]="utenteDTO.cognome" type="text" class="form-control"
                    placeholder="Cognome" (blur)="utenteDTO.cognomeUtenteValidate()">
                <app-form-error [error]="utenteDTO.cognomeError" />
            </div>

            <div class="input-group input-group-sm mb-4">
                <label class="input-group-text">Data di Nascita</label>
                <input name="dataNascita" [(ngModel)]="utenteDTO.dataNascita" [max]="adulto" type="date"
                    class="form-control" (blur)="utenteDTO.dataNascitaUtenteValidate()">
                <app-form-error [error]="utenteDTO.dataNascitaError" />
            </div>

            <div class="input-group input-group-sm mb-4">
                <input name="codiceFiscale" [(ngModel)]="utenteDTO.codiceFiscale" type="text" class="form-control"
                    placeholder="Codice Fiscale" (blur)="utenteDTO.codiceFiscaleUtenteValidate('')">
                <app-form-error [error]="utenteDTO.codiceFiscaleError" />
            </div>

            <div class="input-group input-group-sm mb-4">
                <input name="password" type="password" [(ngModel)]="password" class="form-control"
                    placeholder="Password" (blur)="verificaPassword()">
                <app-form-error [error]="passwordError" />
            </div>

            <div class="input-group input-group-sm mb-4">
                <input name="confermaPassword" [(ngModel)]="confermaPassword" type="password" class="form-control"
                    placeholder="Conferma Password">
                @if (confermaPassword && password !== confermaPassword) {
                <p style="color:red" class="invalid-feedback d-block">Le password non coincidono</p>
                }
            </div>

            @if (auth.isAdmin()) {
            <div class="input-group input-group-sm mb-4">
                <label class="input-group-text">Livello Permessi</label>
                <select name="livelloPermesso" [(ngModel)]="utenteDTO.livelloPermesso" class="form-select">
                    <option value="3">Utente</option>
                    <option value="2">Gestore</option>
                    <option value="1">Admin</option>
                </select>
                <app-form-error [error]="utenteDTO.livelloPermessoError" />
            </div>
            }

        </app-form-layout>

    </div>

    } @else {
    <p class="row justify-content-md-center">Caricamento utente...</p>
    }
</div>
