<div style="width: 50%; margin-left: 20px;">
    <table class="table table-striped table-hover table-sm ">
        <thead>
            <tr>
                <th scope="col-sm-5">CODICE UTENTE</th>
                <th scope="col">NOME</th>
                <th scope="col">COGNOME</th>
                <th scope="col">Livello Permessi</th>
                <th scope="col">AZIONI</th>
            </tr>
        </thead>
        <tbody>
            @for (utente of utenti; track utente.codiceUtente) {
            <tr>
                <td>{{utente.codiceUtente}}</td>
                <td>{{utente.nome}}</td>
                <td>{{utente.cognome}}</td>
                <td>{{permissionLabels[utente.livelloPermessi]}}</td>
                <td>
                    <button class="btn btn-primary btn-sm" (click)="vaiUpdateUtente(utente)"> Modifica </button>
                    <button class="btn btn-danger btn-sm">Elimina</button>
                </td>
            </tr>
            }
        </tbody>
    </table>
</div>
<button
    class="btn btn-primary rounded-circle position-fixed bottom-0 end-0 m-4 d-flex justify-content-center align-items-center"
    style="width: 60px; height: 60px;" (click)="VaiAHome()">
    HOME
</button>
