<head> <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<div style="width: 100%; margin-left: 20px;">
    <table class="table table table-hover ">
        <thead>
            <tr>
                <th scope="col-sm-5">CODICE UTENTE</th>
                <th scope="col">NOME</th>
                <th scope="col">COGNOME</th>
                <th scope="col">Livello Permessi</th>
                <th scope="col">AZIONI</th>
            </tr>
        </thead>
        <tbody class = " margin-left: 5px; table-group-divider">
            @for (utente of utenti; track utente.codiceUtente) {
            <tr>
                <td>{{utente.codiceUtente}}</td>
                <td>{{utente.nome}}</td>
                <td>{{utente.cognome}}</td>
                <td>{{permissionLabels[utente.livelloPermessi]}}</td>
                <td>
                    <button class="btn btn-primary btn-sm me-2" (click)="vaiUpdateUtente(utente)"> <i class="bi bi-pencil-square"></i>  </button>
                    <button class="btn btn-danger btn-sm" (click)="deleteUtente(utente)"><i class="bi bi-trash"></i></button>
                </td>
                <td> </td>
            </tr>
            }
        </tbody>
    </table>
</div>

  <div class="d-flex justify-content-md-center gap-3 mb-4 mt-5">
<button
    class="btn btn-danger me-2" (click)="VaiAHome()">
    <i class="bi bi-house"></i>
</button>
 <button class="btn btn-primary" (click)="vaiAlCreaUtente()">
                        Aggiungi un utente
                    </button>

  </div>
