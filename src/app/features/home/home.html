<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">HOMEPAGE</a>

    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item me-2">
          <button class="btn btn-outline-light" (click)="vaiAlCreaUtente()">
            Crea Utenti
          </button>
        </li>

        <li class="nav-item">
          <button class="btn btn-primary" (click)="vaiAlCreaCamera()">
            Crea Camere
          </button>
        </li>
        <li>
          <ul class="menu">
            <li>
              <ul class="navbar-nav ms-auto">

                <!-- Utente NON loggato -->
                @if (!auth.isLoggedIn()) {
                <li class="nav-item">
                  <a class="nav-link" (click)="openLogin()">Login</a>
                </li>
                }

                <!-- Utente loggato -->
                @if (auth.isLoggedIn()) {
                <li class="nav-item dropdown" (mouseenter)="openDropdown()" (mouseleave)="closeDropdown()">
                  <a class="nav-link dropdown-toggle" role="button">
                    {{ auth.currentUser() }}
                  </a>
                  <ul class="dropdown-menu dropdown-menu-end" [class.show]="dropdownOpen()">
                    <li><a class="dropdown-item" (click)="vaiUpdateUtente()">Modifica</a></li>
                    <li>
                      <hr class="dropdown-divider">
                    </li>
                    <li><a class="dropdown-item" (click)="auth.logout()">Logout</a></li>
                  </ul>
                </li>
                }

              </ul>
            </li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class = "container mt-5">
<div class="row row-cols-1 row-cols-md-2 g-4 justify-content-center">

  <div class="col-md-3">
    <div class="card text-center h-100 border-primary">
      <img src="https://i.pinimg.com/736x/43/14/0a/43140a3803e5f1b39c1ffac1a35a3ec7.jpg" class="card-img-top"
        style="height: 200px; object-fit: cover;" alt="utente">
      <div class="card-body">
        <h5 class="card-title">LOGIN</h5>
        <p class="card-text"></p>
        <button type="button" (click)="openLogin()" class="btn btn-primary ">ACCEDI</button>
      </div>
    </div>
  </div>


  @if (isGestore){
  <div class="col-md-3">
    <div class="card text-center h-100 border-primary">
      <img src="https://i.pinimg.com/736x/df/e3/bb/dfe3bbbd4ebcfc75605b57a8ebc2776e.jpg" class="card-img-top"
        style="height: 200px; object-fit: cover;">
      <div class="card-body">
        <h5 class="card-title">Lista Camere</h5>
        <p class="card-text"></p>
        <button type="button" (click)="vaiAListaCamere()" class="btn btn-primary">Visualizza</button>
      </div>
    </div>
  </div>

  }


 @if (isAdmin) {
  <div class="col-md-3">
    <div class="card text-center h-100">
      <img src="https://i.pinimg.com/736x/71/26/7e/71267e196665cb6a2e48310bcf87f2c7.jpg" class="card-img-top"
        alt="utenti"  style="height: 200px; object-fit: cover;">
      <div class="card-body">
        <h5 class="card-title">Lista Utenti</h5>
        <p class="card-text"></p>
        <button type="button" (click)="vaiAListaUtenti()" class="btn btn-primary ">Visualizza</button>
      </div>
    </div>
  </div>
   } 
  

</div>

</div>
