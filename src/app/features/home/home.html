

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">HOMEPAGE</a>

    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item me-2">
          <button
            class="btn btn-outline-light"
            (click)="vaiAlCreaUtente()">
            Crea Utenti
          </button>
        </li>

        <li class="nav-item">
          <button
            class="btn btn-primary"
            (click)="vaiAlCreaCamera()">
            Crea Camere
          </button>
        </li>
      </ul>
    </div>
  </div>
</nav>


<div style = "width: 50%; margin-left: 20px;">
<table class="table table-striped table-hover table-sm ">
  <thead>
    <tr>
      <th scope="col-sm-5">CODICE CAMERA</th>
      <th scope="col">POSTI LETTO</th>
      <th scope="col">TIPOLOGIA</th>
      <th scope="col">TARIFFA</th>
      <th scope = "col">AZIONI</th>
    </tr>
  </thead>
<tbody>
  @for (camera of camere; track camera.codiceCamera) {
    <tr>
      <td>{{camera.codiceCamera}}</td>
      <td>{{camera.postiLetto}}</td>
      <td>{{camera.tipologia}}</td>
      <td> € {{camera.tariffa}} </td>
      <td>
        <button class = "btn btn-primary btn-sm" (click)="vaiAllUpdateCamera(camera)" > Modifica </button>
        <button class = "btn btn-danger btn-sm"> Elimina</button>
      </td>
    </tr>
  }
  </tbody>
</table>
</div>
