<head> <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<div style="width: 100%; margin-left: 20px;">
    <table class="table table-striped table-hover table-sm ">
        <thead>
            <tr>
                <th scope="col-sm-5">Codice Prenotazione</th>
                <th scope="col">Data inzio</th>
                <th scope="col">Data fine</th>
                <th scope="col">Importo totale</th>
                <th scope="col">AZIONI</th>
    
            </tr>
        </thead>
        <tbody>
            @for (prenotazione of prenotazioni; track prenotazione.codicePrenotazione) {
            <tr>
                <td>{{prenotazione.codicePrenotazione}}</td>
                <td>{{prenotazione.dataInizio}}</td>
                <td>{{prenotazione.dataFine}}</td>
                <td>€{{prenotazione.costoComplessivo}} </td>
                <td>
                    <button class="btn btn-primary btn-sm me-2" (click)="vaiAllUpdatePrenotazione(prenotazione)"><i class="bi bi-pencil-square"></i> 
                    </button>
                    <button class="btn btn-danger btn-sm" (click)="deletePrenotazione(prenotazione)"><i class="bi bi-trash"></i></button>
                </td>
                <td> </td>
            </tr>
            }
        </tbody>
    </table>
</div>

<div class="d-flex justify-content-md-center gap-3 mb-4 mt-5">
    <button type="button" (click)="VaiAHome()" class="btn btn-danger btn-sm">
       <i class="bi bi-house"></i>
    </button>
    <button class="btn btn-primary" (click)="vaiAlCreaPrenotazione()">
                        Inserisci nuova prenotazione
                    </button>
</div>
