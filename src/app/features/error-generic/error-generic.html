<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <div class="container vh-100 d-flex justify-content-center align-items-center">
    <div class="card shadow text-center p-4" style="max-width: 500px;">
      <div class="card-body">

        <h1 class="display-1 text-danger">⚠️</h1>

        <h2 class="card-title mb-3">Si è verificato un errore</h2>

        <p class="card-text text-muted">
          Qualcosa è andato storto. Riprova più tardi oppure torna alla pagina principale.
        </p>

        <button class="btn btn-danger mt-3" (click)="VaiAHome()">
          Torna alla Home
        </button>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
