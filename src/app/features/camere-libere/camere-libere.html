<div class="modal" tabindex="-1" [class.show]="true" style="display: block;">
  <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Camere disponibili</h5>
        <button type="button" class="btn-close" aria-label="Chiudi" (click)="Annulla()"></button>
      </div>

      <div class="modal-body">
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3">
          @for (camera of camereLibere(); track camera.codiceCamera) {
          <div class="col">
            <div class="card h-100 shadow-sm">
              <div class="card-body d-flex flex-column">
                <h5 class="card-title mb-1">Camera {{ camera.codiceCamera }}</h5>
                <span class="badge bg-secondary align-self-start mb-2">
                  {{ camera.tipologia }}
                </span>

                <ul class="list-unstyled small text-muted mb-3">
                  <li>{{ camera.postiLetto }} posti letto</li>
                  <li class="fw-bold text-dark mt-1">
                    {{ camera.tariffa | currency:'EUR' }} / notte
                  </li>
                </ul>

                <button class="btn btn-primary mt-auto" (click)="selezionaCamera(camera)">
                  Seleziona
                </button>
              </div>
            </div>
          </div>
          } @empty {
          <div class="col-12">
            <p class="text-muted text-center">Nessuna camera disponibile per le date selezionate.</p>
          </div>
          }
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="Annulla()">Annulla</button>
      </div>

    </div>
  </div>
</div>

<!-- backdrop scuro dietro al modale -->
<div class="modal-backdrop show" (click)="Annulla()"></div>
