<app-nav-layout></app-nav-layout>
<div class="container d-flex justify-content-center flex-column min-vh-100">

    <h1 class=" display-1 row justify-content-md-center mb-5"> PRENOTA </h1>

    <div class="row justify-content-md-center">

        <app-form-layout submitLabel="Aggiorna" [showReset]="false" (formSubmit)="updatePrenotazione()"
            (formBack)="VaiAPaginaPrecedente()">

            <div class="input-group mb-4">
                <label class="input-group-text">Codice utente</label>
                <input name="dataInizio" [(ngModel)]="prenotazioneDTO.codiceUtente" class="form-control" disabled>
            </div>

            <div class="input-group mb-4">
                <label class="input-group-text">Data check-in</label>
                <input name="dataInizio" [(ngModel)]="prenotazioneDTO.dataInizio" [min]="today" type="date"
                    class="form-control" (blur)="prenotazioneDTO.dataInizioValidate()">
                <app-form-error [error]="prenotazioneDTO.dataInizioError" />
            </div>

            <div class="input-group mb-4">
                <label class="input-group-text">Data check-out</label>
                <input name="dataFine" [(ngModel)]="prenotazioneDTO.dataFine" [min]="this.prenotazioneDTO.dataInizio"
                    type="date" class="form-control"
                    (blur)="prenotazioneDTO.dataFineValidate(); prenotazioneDTO.dataInizioValidate()">
                <app-form-error [error]="prenotazioneDTO.dataFineError" />
            </div>

            <div class="input-group mb-4">
                <select id="tipologia" class="form-select" [(ngModel)]="prenotazioneDTO.tipologiaCamera"
                    (blur)="this.prenotazioneDTO.tipologiaCameraValidate()" name="tipologia">
                    <option [ngValue]="null" disabled selected>Seleziona tipologia camera</option>
                    @for (tipo of tipologie; track tipo) {
                    <option [ngValue]="tipo">{{ tipo }}</option>
                    }
                </select>
                <app-form-error [error]="prenotazioneDTO.tipologiaCameraError" />
            </div>

            <div class="input-group mb-4">
                <button type="button" class="btn btn-primary btn-sm" (click)="apriSelezioneCamera()">
                    <i class="bi bi-search"></i>
                </button>
            </div>

            <div class="input-group mb-4">
                <span class="input-group-text fs-5" id="inputGroupPrepend">€</span>
                <input name="nome" [(ngModel)]="prenotazioneDTO.costoComplessivo" type="text" class="form-control"
                    placeholder="0.00" disabled>
                <app-form-error [error]="prenotazioneDTO.costoComplessivoError" />
            </div>

        </app-form-layout>

    </div>
</div>
