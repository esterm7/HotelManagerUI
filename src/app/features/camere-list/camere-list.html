<app-nav-layout></app-nav-layout>

<table class="table table-hover text-center">
  <thead>
    <tr>
      <th scope="col-sm-5">CODICE CAMERA</th>
      <th scope="col">POSTI LETTO</th>
      <th scope="col">TIPOLOGIA</th>
      <th scope="col">TARIFFA</th>
      <th scope="col">AZIONI</th>

    </tr>
  </thead>
  <tbody class="table-group-divider margin-left: 50px">
    @for (camera of camere; track camera.codiceCamera) {
    <tr>
      <td>{{camera.codiceCamera}}</td>
      <td>{{camera.postiLetto}}</td>
      <td>{{camera.tipologia}}</td>
      <td> € {{camera.tariffa}} </td>
      <td>
        <div class=margin-left: 5px;>
          <button class="btn btn-primary btn-sm me-2" ngbPopover="Modifica" triggers="hover focus"
            (click)="vaiAllUpdateCamera(camera)"><i class="bi bi-pencil-square"></i> </button>
          <button class="btn btn-danger btn-sm" ngbPopover="Cancella" triggers="hover focus"
            (click)="deleteCamera(camera)"><i class="bi bi-trash"></i></button>
        </div>
      </td>
      <td> </td>
    </tr>
    }
  </tbody>
</table>


<div class="d-flex justify-content-md-center gap-3 mb-4 mt-5">
  <button type="button" ngbPopover="Torna alla home" triggers="hover focus" (click)="VaiAHome()"
    class="btn btn-danger btn-sm">
    <i class="bi bi-house fs-4"></i>
  </button>
  <button class="btn btn-primary" ngbPopover="Aggiungi una camera" triggers="hover focus" (click)="vaiAlCreaCamera()">
        <i class="bi bi-plus-lg fs-4"></i>

  </button>
