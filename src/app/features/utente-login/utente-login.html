<div class="container min-vh-100 d-flex justify-content-center align-items-center">

    <div class="card shadow p-4 rounded-4" style="width: 400px;">

        <h1 class="display-5 text-center mb-4">
            LOGIN
        </h1>

        <form>

            <div class="mb-3">
                <input name="codiceUtente" [(ngModel)]="authDTO.codiceUtente" type="text" class="form-control"
                    placeholder="Codice utente">
            </div>

            <div class="mb-3">
                <input name="password" type="password" [(ngModel)]="authDTO.password" class="form-control"
                    placeholder="Password">
            </div>

            <button type="submit" class="btn btn-primary w-100" (click)="autenticazioneUtente()">
                Accedi
            </button>

        </form>

    </div>

</div>
